name: Android 16 Compatibility Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build API 36
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # FIXED: Explicitly install Gradle 8.10 since the wrapper jar is missing
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10'

    - name: Accept Android SDK Licenses
      run: |
        yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses || true

    # FIXED: Use 'gradle' command instead of './gradlew'
    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: leetcode-tracker-android16-debug
        path: build/outputs/apk/debug/*.apk
