name: Android 16 Compatibility Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build API 36
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    # CRITICAL: Accept licenses for the new Android 16 (API 36) SDK
    - name: Accept Android SDK Licenses
      run: |
        yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build Debug APK
      # Uses the wrapper to ensure Gradle 8.10 is used (required for your plugins)
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: leetcode-tracker-android16-debug
        # CORRECTED PATH: Removed 'app/' prefix to match your verified folder structure
        path: build/outputs/apk/debug/*.apk
